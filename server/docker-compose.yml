version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: quickshow-backend-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_backend_data:/data/db
    restart: unless-stopped

  server:
    build: .
    container_name: quickshow-backend-only
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Automatically connect the backend to the spawned mongo container
      - MONGODB_URI=mongodb://mongodb:27017/quickshow
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_backend_data:
